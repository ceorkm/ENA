<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ENA — floating prompt enhancer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=Mulish:wght@600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  html, body { margin: 0; height: 100%; background: #e8e8ea; }
  /* canvas chrome typography */
  .dc-section-title, .dc-art-label { font-family: "Mulish", system-ui, sans-serif !important; }

  /* ---- clean neutral surface — app UI only ---- */
  .stage {
    width: 100%; height: 100%;
    display: flex; justify-content: center; align-items: center;
    padding: 30px;
    position: relative; overflow: hidden;
    background:
      radial-gradient(120% 120% at 50% 0%, #f4f5f7 0%, #eceef1 100%);
  }

  #root { min-height: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="enhance.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="bar.jsx"></script>
<script type="text/babel" src="onboarding.jsx"></script>

<script type="text/babel">
const { useState } = React;

function Wifi() {
  return (<svg className="wifi" viewBox="0 0 16 12" fill="none"><path d="M8 10.5l0 0" stroke="#fff" strokeWidth="2.4" strokeLinecap="round"/><path d="M3.2 6.4a7 7 0 0 1 9.6 0M5.4 8.4a4 4 0 0 1 5.2 0" stroke="#fff" strokeWidth="1.4" strokeLinecap="round" fill="none"/></svg>);
}

function MenuBar({ name }) {
  return (
    <div className="menubar">
      <div className="menubar__l">
        <span className="dot"></span>
        <b>{name}</b><span>File</span><span>Edit</span><span>View</span><span>Help</span>
      </div>
      <div className="menubar__r">
        <Wifi /><span className="batt"></span><span>Fri 9:41</span>
      </div>
    </div>
  );
}

/* a clean neutral surface — app UI only, no desktop chrome */
function Stage({ children }) {
  return <div className="stage stage--plain">{children}</div>;
}

const DIRECTIONS = [
  { v: "native", title: "ENA · the build", sub: "Clean Native — the selected direction. Every screen is live: type a prompt and press ↩, or click through the onboarding." }
];

// [view, label, artboard height, width]
const STATES = [
  ["onboarding", "Onboarding · first run",   430, 620],
  ["resting",    "Resting · add a project",  232, 800],
  ["picker",     "Choose a project",         430, 800],
  ["indexing",   "Indexing · 1 → 100%",      268, 800],
  ["summary",    "Project indexed · summary", 600, 800],
  ["result",     "Enhanced · file-aware",    560, 800],
  ["variations", "3 variations",             580, 800],
  ["diff",       "Before · After",           485, 800],
  ["history",    "Recent history",           440, 800],
  ["settings",   "Settings",                 540, 800]
];

function App() {
  return (
    <DesignCanvas>
      {DIRECTIONS.map((d) => (
        <DCSection key={d.v} id={d.v} title={d.title} subtitle={d.sub}>
          {STATES.map(([view, label, h, w]) => (
            <DCArtboard key={view} id={d.v + "-" + view} label={label} width={w} height={h}>
              <Stage>
                {view === "onboarding"
                  ? <Onboarding variant={d.v} />
                  : <FloatingBar variant={d.v} initialView={view} loopIndex={view === "indexing"} />}
              </Stage>
            </DCArtboard>
          ))}
        </DCSection>
      ))}
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
